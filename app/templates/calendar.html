<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Maintenance & Training Calendar | Ticket-Tally</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/main.css" />
  <link rel="stylesheet" href="/static/css/dashboard.css" />
  <link rel="stylesheet" href="/static/css/fixes.css" />
  <!-- FullCalendar CSS -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.min.css" rel="stylesheet" />
  <!-- Custom Calendar styling -->
  <style>
    .calendar-page {
      min-height: 100vh;
      background: var(--background);
      padding: 2rem 0;
    }

    .page-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow-sm);
    }

    .page-title {
      font-size: 2rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .page-subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .calendar-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: var(--shadow-sm);
    }

    /* Glassmorphic colors for calendar events */
    .fc-event-maintenance {
      background: rgba(239, 68, 68, 0.15) !important;
      border-left: 4px solid var(--danger, #ef4444) !important;
      border-top: none !important;
      border-right: none !important;
      border-bottom: none !important;
      color: var(--danger, #ef4444) !important;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .fc-event-training {
      background: rgba(59, 130, 246, 0.15) !important;
      border-left: 4px solid var(--primary-500, #3b82f6) !important;
      border-top: none !important;
      border-right: none !important;
      border-bottom: none !important;
      color: var(--primary-500, #3b82f6) !important;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .fc-event-system-update {
      background: rgba(16, 185, 129, 0.15) !important;
      border-left: 4px solid var(--success, #10b981) !important;
      border-top: none !important;
      border-right: none !important;
      border-bottom: none !important;
      color: var(--success, #10b981) !important;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .fc-event-other {
      background: rgba(245, 158, 11, 0.15) !important;
      border-left: 4px solid var(--warning, #f59e0b) !important;
      border-top: none !important;
      border-right: none !important;
      border-bottom: none !important;
      color: var(--warning, #f59e0b) !important;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
    }

    /* Dark Mode calendar styling overrides */
    [data-theme="dark"] .fc-theme-standard td,
    [data-theme="dark"] .fc-theme-standard th,
    [data-theme="dark"] .fc-theme-standard .fc-scrollgrid {
      border-color: rgba(255, 255, 255, 0.08) !important;
    }

    [data-theme="dark"] .fc-col-header-cell-cushion,
    [data-theme="dark"] .fc-daygrid-day-number {
      color: var(--text-primary) !important;
    }

    [data-theme="dark"] .fc-button-primary {
      background-color: var(--surface-elevated) !important;
      border-color: rgba(255, 255, 255, 0.1) !important;
      color: var(--text-primary) !important;
    }

    [data-theme="dark"] .fc-button-primary:hover,
    [data-theme="dark"] .fc-button-active {
      background-color: var(--primary-500) !important;
      border-color: var(--primary-500) !important;
      color: white !important;
    }

    .fc-event-title, .fc-event-time {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .glass-modal-content {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: var(--radius-xl, 1.25rem) !important;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
      position: relative;
      overflow: hidden;
    }

    [data-theme="dark"] .glass-modal-content {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }
  </style>
</head>

<body>
  <div class="calendar-page">
    <div class="container">
      <!-- Back Button -->
      <div class="mb-4">
        <button onclick="goBackToDashboard()" class="btn btn-outline-custom">
          <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
        </button>
        <button id="darkModeToggle" class="btn btn-icon-only float-end">
          <i class="fas fa-moon"></i>
        </button>
      </div>

      <!-- Page Header -->
      <div class="page-header">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <h1 class="page-title">
              <i class="fas fa-calendar-alt me-3"></i>IT Systems Calendar
            </h1>
            <p class="page-subtitle">
              Monitor maintenance downtimes, hardware updates, and training schedules
            </p>
          </div>
          <button id="createEventBtn" class="btn btn-primary-custom btn-lg d-none" onclick="showAddEventModal()">
            <i class="fas fa-plus me-2"></i>Add IT Event
          </button>
        </div>
      </div>

      <!-- Legend & Main Calendar -->
      <div class="row">
        <div class="col-lg-3 mb-4">
          <div class="card-custom p-4">
            <h5 class="fw-bold mb-3">Event Categories</h5>
            <div class="d-flex flex-column gap-3">
              <div class="d-flex align-items-center gap-2">
                <span style="width: 12px; height: 12px; border-radius: 50%; background: #ef4444;"></span>
                <span class="small fw-semibold">IT Maintenance</span>
              </div>
              <div class="d-flex align-items-center gap-2">
                <span style="width: 12px; height: 12px; border-radius: 50%; background: #3b82f6;"></span>
                <span class="small fw-semibold">IT Staff Training</span>
              </div>
              <div class="d-flex align-items-center gap-2">
                <span style="width: 12px; height: 12px; border-radius: 50%; background: #10b981;"></span>
                <span class="small fw-semibold">System Update / Release</span>
              </div>
              <div class="d-flex align-items-center gap-2">
                <span style="width: 12px; height: 12px; border-radius: 50%; background: #f59e0b;"></span>
                <span class="small fw-semibold">Other IT Events</span>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-9">
          <div class="calendar-container">
            <div id="calendar"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Event Modal (Create / Edit) -->
  <div class="modal fade" id="eventModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass-modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="eventModalTitle">Add IT Event</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="eventForm">
            <input type="hidden" id="eventId" />
            <div class="mb-3">
              <label for="eventTitle" class="form-label">Event Title</label>
              <input type="text" class="form-control" id="eventTitle" placeholder="e.g. Server Migration" required />
            </div>

            <div class="mb-3">
              <label for="eventDescription" class="form-label">Description</label>
              <textarea class="form-control" id="eventDescription" rows="3" placeholder="Details about this event..."></textarea>
            </div>

            <div class="mb-3">
              <label for="eventType" class="form-label">Event Category</label>
              <select class="form-select" id="eventType" required>
                <option value="maintenance">IT Maintenance</option>
                <option value="training">IT Staff Training</option>
                <option value="system_update">System Update / Release</option>
                <option value="other">Other IT Event</option>
              </select>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="eventStartTime" class="form-label">Start Time</label>
                <input type="datetime-local" class="form-control" id="eventStartTime" required />
              </div>
              <div class="col-md-6 mb-3">
                <label for="eventEndTime" class="form-label">End Time</label>
                <input type="datetime-local" class="form-control" id="eventEndTime" required />
              </div>
            </div>

            <div class="d-flex justify-content-between mt-4">
              <button type="button" id="deleteEventBtn" class="btn btn-danger d-none" onclick="handleDeleteEvent()">
                <i class="fas fa-trash me-2"></i>Delete
              </button>
              <div class="d-flex gap-2 ms-auto">
                <button type="button" class="btn btn-outline-custom" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" class="btn btn-primary-custom" id="saveEventBtn">Save Event</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Event Details Modal (Read Only for non-admin) -->
  <div class="modal fade" id="eventDetailsModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass-modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="viewEventTitle">IT Event Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <h6 class="text-muted text-uppercase small">Category</h6>
            <div id="viewEventBadge"></div>
          </div>
          <div class="mb-3">
            <h6 class="text-muted text-uppercase small">Description</h6>
            <p id="viewEventDescription" class="mb-0" style="white-space: pre-wrap;"></p>
          </div>
          <div class="row mb-3">
            <div class="col-6">
              <h6 class="text-muted text-uppercase small">Start Time</h6>
              <span id="viewEventStart" class="fw-semibold"></span>
            </div>
            <div class="col-6">
              <h6 class="text-muted text-uppercase small">End Time</h6>
              <span id="viewEventEnd" class="fw-semibold"></span>
            </div>
          </div>
          <div class="mb-3">
            <h6 class="text-muted text-uppercase small">Created By</h6>
            <span id="viewEventCreator"></span>
          </div>
          <div class="d-flex justify-content-end mt-4">
            <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- FullCalendar JS -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/auth.js"></script>
  <script src="{{ url_for('static', filename='js/socket.io.min.js') }}"></script>
  <script>
    let socket;
    try {
      socket = io();
    } catch (e) {
      console.warn("Socket.io failed to initialize:", e);
    }
  </script>
  <script src="/static/js/calendar.js"></script>
</body>

</html>
